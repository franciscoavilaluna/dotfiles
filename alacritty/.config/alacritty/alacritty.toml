[font]
size = 7

  [font.normal]
  family = "MesloLGS Nerd Font Mono"
  style = "Regular"

  [font.bold]
  family = "MesloLGS Nerd Font Mono"
  style = "Bold"

  [font.italic]
  family = "MesloLGS Nerd Font Mono"
  style = "Italic"

  [font.bold_italic]
  family = "MesloLGS Nerd Font Mono"
  style = "Bold Italic"

[window]
opacity = 0.85
dynamic_padding = false

  [window.padding]
  x = 0
  y = 0

[colors.primary]
background = '#000000' # Negro absoluto (OLED-like)
foreground = '#dcdccc' # Blanco "hueso" para no cansar la vista

[colors.normal]
black =   '#1e2320'
red =     '#705050'
green =   '#60b48a'
yellow =  '#dfaf8f'
blue =    '#506070'
magenta = '#dc8cc3'
cyan =    '#8cd0d3'
white =   '#dcdccc'

[colors.bright]
black =   '#709080'
red =     '#dca3a3'
green =   '#c3bf9f'
yellow =  '#f0dfaf'
blue =    '#94bff3'
magenta = '#ec93d3'
cyan =    '#93e0e3'
white =   '#ffffff'

[cursor]
style = { shape = "Block", blinking = "Always" }
vi_mode_style = { shape = "Block" }

[font]
size = 12

  [font.normal]
  family = "MesloLGS NF"
  style = "Regular"

  [font.bold]
  family = "MesloLGS NF"
  style = "Bold"

  [font.italic]
  family = "MesloLGS NF"
  style = "Italic"

  [font.bold_italic]
  family = "MesloLGS NF"
  style = "Bold Italic"

[window]
opacity = 1
dynamic_padding = false

  [window.padding]
  x = 10
  y = 10

[colors.primary]
background = "#000000"
foreground = "#ffffff" # Blanco puro (macOS usa #dddddd, pero en negro puro luce mejor el blanco)

[colors.normal]
black =   "#000000"
red =     "#990000"
green =   "#00a600"
yellow =  "#999900"
blue =    "#0000b2"
magenta = "#b200b2"
cyan =    "#00a6b2"
white =   "#bfbfbf"

[colors.bright]
black =   "#666666"
red =     "#e50000"
green =   "#00d900"
yellow =  "#e5e500"
blue =    "#0000ff"
magenta = "#e500e5"
cyan =    "#00e5e5"
white =   "#e5e5e5"

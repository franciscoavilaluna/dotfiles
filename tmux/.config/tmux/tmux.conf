# Same color inside tmux and base terminal
set -g default-terminal "xterm-256color"
set -g terminal-overrides ",xterm-256color:Tc"
set -g focus-events on

# Base tmux
set -s escape-time 0
set -g base-index 1
set -g display-time 700
set -g history-limit 10000
set -g mouse on

# Bindings
unbind C-b
set -g prefix C-t
bind C-f send-prefix
bind C-a send-prefix

# Window split
unbind '"'
unbind %
bind '-' split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Window switching
#bind -n S-down new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -n S-left prev
bind -n S-right next

bind -n 'M-1' select-window -t 1
bind -n 'M-2' select-window -t 2
bind -n 'M-3' select-window -t 3
bind -n 'M-4' select-window -t 4
bind -n 'M-5' select-window -t 5
bind -n 'M-6' select-window -t 6
bind -n 'M-7' select-window -t 7
bind -n 'M-8' select-window -t 8
bind -n 'M-9' select-window -t 9

# Vim-like pane switching
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resizing pane
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# (r)eload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Open in current Window

# --- E-INK MONOCHROME COLORSCHEME ---

# Definición de variables basadas en tu paleta E-ink Light
E_INK_BG="#CCCCCC"   # Fondo principal (Igual a Alacritty/Vim)
E_INK_FG="#333333"   # Texto principal
E_INK_ALT="#C2C2C2"  # Gris casi fondo
E_INK_DIM="#868686"  # Gris medio para elementos secundarios
E_INK_DARK="#333333" # Negro/Gris muy oscuro para resaltar
E_INK_SEL="#AEAEAE"  # Color de selección

# Modo copia (Copy mode)
# Texto claro sobre fondo oscuro para que resalte al seleccionar
setw -g mode-style "fg=${E_INK_BG} bg=${E_INK_DARK}"

# Bordes de los Panes
# Usamos un gris suave para el borde inactivo y negro para el activo
set -g pane-border-style "fg=${E_INK_ALT}"
set -g pane-active-border-style "fg=${E_INK_DARK}"

# Barra de estado (Statusbar)
set -g status-style "bg=${E_INK_BG},fg=${E_INK_FG}"
set -g status-position bottom
set -g status-justify absolute-centre

# Elementos de la barra
wg_sep="#[fg=${E_INK_DIM}] | "
wg_prfx="#[fg=${E_INK_DARK},bold]#{?client_prefix,<PREFIX> ,}"
wg_time="#[fg=${E_INK_FG}]%H:%M"
wg_date="#[fg=${E_INK_FG}]%d/%b/%Y"

# Configuración de los lados de la barra
set -g status-left "#[fg=${E_INK_DARK},bold][#S]"
set -g status-right "${wg_prfx}${wg_time}${wg_sep}${wg_date}"
set -g status-right-length 100
set -g status-left-length 100

# Formato de las ventanas (Pestañas)
# Ventana inactiva: Gris tenue
set -g window-status-format "#[fg=${E_INK_DIM}] #I:#W "
# Ventana activa: Texto oscuro y en negrita (puedes añadir subrayado si quieres)
set -g window-status-current-format "#[fg=${E_INK_DARK},bold,underscore] #I:#W "

# Mensajes (Comandos de tmux)
set -g message-style "bg=${E_INK_DARK} fg=${E_INK_BG}"
